server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html must never be cached — the browser must always fetch the
    # latest so it picks up new content-hashed asset filenames on deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Vite outputs content-hashed filenames (index-<hash>.js).
    # Safe to cache indefinitely — the hash changes whenever the content changes.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — all unknown paths serve index.html for React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
