services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - dashboard
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    deploy:
      replicas: 2
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres-primary:5432/taskqueue
      DATABASE_READ_URL: postgres://postgres:postgres@postgres-replica:5432/taskqueue
      REDIS_URL: redis://:redispass@redis:6379
      PORT: 3000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: task-queue-api
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    deploy:
      replicas: 2
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres-primary:5432/taskqueue
      WORKER_CONCURRENCY: 3
      LEASE_DURATION_SECONDS: 30
      HEARTBEAT_INTERVAL_SECONDS: 10
      STALE_LEASE_CHECK_INTERVAL_SECONDS: 15
      POLL_INTERVAL_MS: 500
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: task-queue-worker
    depends_on:
      postgres-primary:
        condition: service_healthy
      jaeger:
        condition: service_started
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped

  postgres-primary:
    image: postgres:16-alpine
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=5
      -c max_replication_slots=5
      -c wal_keep_size=128MB
      -c hot_standby=on
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskqueue
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./infra/postgres/init-replication.sh:/docker-entrypoint-initdb.d/01-init-replication.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres-replica:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
      - ./infra/postgres/replica-entrypoint.sh:/replica-entrypoint.sh
    entrypoint: ['/bin/sh', '/replica-entrypoint.sh']
    command: ['-c', 'hot_standby=on']
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redispass
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redispass', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - '9091:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - '16687:16686'
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    restart: unless-stopped

volumes:
  pg_primary_data:
  pg_replica_data:
  redis_data:
